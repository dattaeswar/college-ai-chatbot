<!DOCTYPE html>
<html>
<head>
<title>College AI Chatbot</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f5f5f5;
margin:40px;
}

h1{
margin-bottom:20px;
}

#chatbox{
background:white;
border-radius:10px;
padding:20px;
height:400px;
overflow-y:auto;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.user{
margin-top:10px;
font-weight:bold;
}

.bot{
margin-left:10px;
color:#1a73e8;
}

#controls{
margin-top:20px;
display:flex;
gap:10px;
}

input{
flex:1;
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

</style>
</head>


<body>

<h1>College AI Chatbot</h1>

<div id="chatbox"></div>

<div id="controls">
<input id="question" placeholder="Ask something about GITAM..." />
<button onclick="send()">Send</button>
</div>


<script>

async function send(){

const input = document.getElementById("question");
const chatbox = document.getElementById("chatbox");

let question = input.value;

if(!question) return;

chatbox.innerHTML += "<div class='user'>You: " + question + "</div>";
chatbox.innerHTML += "<div class='bot'>Bot is thinking...</div>";

input.value = "";

chatbox.scrollTop = chatbox.scrollHeight;

try{

const response = await fetch(
"https://college-ai-chatbot-b4c4.onrender.com/chat?q=" + encodeURIComponent(question)
);

const data = await response.json();

chatbox.lastChild.remove();

chatbox.innerHTML += "<div class='bot'>Bot: " + data.response + "</div>";

}catch(error){

chatbox.lastChild.remove();

chatbox.innerHTML += "<div class='bot'>Bot: Sorry, the server is waking up. Please try again in a moment.</div>";

}

chatbox.scrollTop = chatbox.scrollHeight;

}

</script>

</body>
</html>
